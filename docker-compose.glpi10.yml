services:

  glpi10:
    image: madminhu/glpi10:latest
    container_name: glpi10
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      MARIADB_HOST: mariadb-glpi10
      MARIADB_PORT: 3306
      MARIADB_DATABASE: glpi
      MARIADB_USER: glpi-user
      MARIADB_PASSWORD: glpi-pass
      TIMEZONE: Europe/Budapest
    volumes:
      - glpi10-data:/var/www/html
    depends_on:
      mariadb-glpi10:
        condition: service_healthy
    networks:
      - glpi10-net

  mariadb-glpi10:
    image: mariadb:10.11
    container_name: mariadb-glpi10
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root-pass
      MYSQL_DATABASE: glpi
      MYSQL_USER: glpi-user
      MYSQL_PASSWORD: glpi-pass
    volumes:
      - mariadb10-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - glpi10-net

volumes:
  glpi10-data:
  mariadb10-data:

networks:
  glpi10-net:
    driver: bridge
